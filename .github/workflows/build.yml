name: Build APK
on: [push]

permissions:
  contents: read
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android platform 34
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Point Gradle at the SDK
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'
          cache-disabled: true

      - name: Build debug APK
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          gradle assembleDebug --stacktrace --no-daemon 2>&1 | tee build.log

      # If the build breaks, post the log as a GitHub Issue so the error is
      # readable without digging through the Actions UI.
      - name: Report failure
        if: steps.build.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo '```' > body.md
          tail -c 50000 build.log >> body.md
          echo '```' >> body.md
          gh issue create --title "Build failed (${GITHUB_SHA:0:7})" --body-file body.md
          exit 1

      - uses: actions/upload-artifact@v4
        if: steps.build.outcome == 'success'
        with:
          name: AdBlocker-debug
          path: app/build/outputs/apk/debug/app-debug.apk
